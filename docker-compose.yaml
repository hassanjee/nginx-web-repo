services:
  app:
    image: hjavedengineer/nginx-web-server:latest # Updated by Jenkins
    container_name: node_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Add your app env vars below or use .env file
      # - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env.production # optional — create this file for secrets
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db_data:

networks:
  app_network:
    driver: bridge
